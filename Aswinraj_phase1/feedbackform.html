<html>

        <title>Feedback Form</title>
    </head>
    <body>
        <h1>Feedback Form.</h1>
        <form>
            <label for="feedback">Feedback:<span class="required">*</span></label><br>
            <textarea id="feedback" name="feedback" required placeholder="Enter your feedback"></textarea><br><br>

            <label>Rating:<span class="required">*</span></label><br>
            <input type="number"min="1"max="10" required >
            <br><br>
            <h1></h1><input type="submit" value="Submit"></h1>

        </form>
    </body>
</html>
