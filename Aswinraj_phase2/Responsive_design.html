<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Design</title>
<style>
  .navbar{
    width: 100%;
    height: 40px;
    background-color: gray;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: white;
    padding: 15px 0px;
    position: sticky;
    top:0;
  }
  .logo{
    font-size: 22px;
    font-weight: bold;
    margin-left: 20px;
  }
  /* .menu{
    display: flex;
    gap: 20px;
  } */
  .menu a{
    color: white;
    text-decoration: none;
    margin-right: 20px;
    font-size: 18px;
  }
  .content{
    padding: 30px 20px;
    text-align: center;
    background-color: lightgray;
  }
  .container{
    display: flex;
    gap: 20px;
    padding: 20px;
    justify-content: center;
  }
  .card{
    background-color: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    width: 200px;
    text-align: center;
  }
  
  .footer {
      background-color: gray;
      color: white;
      text-align: center;
      margin-top: 100px;
      padding: 16px;
      font-size: 14px;
    }

  @media (min-width: 768px) {
    .menu{
      display: flex;
    }
    

  }
  @media (max-width: 768px) {
    .menu{
      position: absolute;
      top: 60px;
      right: 20px;
      background-color: gray;
      flex-direction: column;
      display: inline;

    }
  
  }

  @media (max-width: 600px) {
    .container{
      flex-direction: column;
      align-items: center;
    }
  }

  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">My Website</div>
    <div class="menu">
      <a href="">Home</a>
      <a href="">About</a>
      <a href="">Services</a>
      <a href="">Contact</a>
    </div>
  </div>
  
  <div class="content">
    <h1>Welcome to My Website</h1>
    <p>Responsive design for all devices.</p>
  </div>

  <div class="container">
        <div class="card">
            <h3>service 1</h3>
            <p>mobile friendly layout</p>
        </div>
        <div class="card">
            <h3>service 2</h3>
            <p>tablet optimized view</p>
        </div>
        <div class="card">
            <h3>service 3</h3>
            <p>desktop responsive design</p>
        </div>
        <div class="card">
            <h3>service 4</h3>
            <p>cross-device compatibility</p>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2024 My Website. All rights reserved.</p>
    </div>
</body>
</html>
