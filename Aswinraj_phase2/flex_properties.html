<!DOCTYPE html>
<html>
<head>
<title>Flex Properties</title>
<style>
.container {
  display: flex;

  flex-direction: row;
  flex-wrap: wrap;            
  justify-content: space-around;
  align-items: center;          
  align-content: space-between; 

  height: 400px;
  border: 3px solid black;
  gap: 10px;
}


.item {
  background: lightblue;
  border: 2px solid blue;
  padding: 20px;
  font-size: 20px;
  text-align: center;
  flex-grow: 1;
  flex-shrink: 1;
  flex-basis: 100px;
}

.item1 {
  order: 2;
  flex-grow: 2;
}

.item2 {
  order: 1;
  align-self: flex-start;
}

.item3 {
  order: 3;
  flex-shrink: 2;
}

.item4 {
  align-self: flex-end;
}
</style>

</head>
<body>

<h2 style="color:blue">Flex properties</h2>

<div class="container">
  <div class="item item1">1</div>
  <div class="item item2">2</div>
  <div class="item item3">3</div>
  <div class="item item4">4</div>
  <div class="item">5</div>
  <div class="item">6</div>
</div>

</body>
</html>
