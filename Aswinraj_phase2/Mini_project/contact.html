<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">ShoeStore</div>

  <input type="checkbox" id="menu-toggle">
  <label for="menu-toggle" class="menu-icon">☰</label>

  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="about.html">About Us</a>
    <a href="contact.html">Contact</a>
    
  </nav>
</header>

<section class="contact">
  <h2>Contact Us</h2>

  <form>
    <input type="text" placeholder="Your Name" required pattern="[A-Za-z]+" title="Please enter only letters" required>
    <input type="tel" placeholder="Your Phone Number" maxlength="10" pattern="[0-9]{10}" title="Please enter a valid 10-digit phone number" required>
    <input type="email" placeholder="Your Email" required>
    <input type="text" placeholder="Your Address" required>
    <textarea placeholder="Your Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer>
  <p>©2026 ShoeStore. All rights reserved.</p>
</footer>

</body>
</html>
