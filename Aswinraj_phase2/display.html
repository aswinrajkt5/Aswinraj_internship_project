<!DOCTYPE html>
<html>
<head>
<title>Display.html</title>

<style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    h2 {
      margin-top: 30px;
    }

    .block div {
      display: block;
      background: lightblue;
      margin: 5px 0;
      padding: 10px;
    }

    .inline span {
      display: inline;
      background: yellow;
      padding: 5px;
    }

    .inline-block div {
      display: inline-block;
      width: 100px;
      height: 50px;
      background: lightseagreen;
      margin: 5px;
      text-align: center;
      line-height: 50px;
    }

    .none .hide {
      display: none;
    }
</style>
</head>
<body>

  <h1>Display property</h1>

  <h2>1. display: block</h2>
  <div class="block">
    <div>Block 1</div>
    <div>Block 2</div>
  </div>

  <h2>2. display: inline</h2>
  <div class="inline">
    <span>Inline 1</span>
    <span>Inline 2</span>
  </div>

  <h2>3. display: inline-block</h2>
  <div class="inline-block">
    <div>Box 1</div>
    <div>Box 2</div>
  </div>

  <h2>4. display: none</h2>
  <div class="none">
    <p class="hide">You cannot see this text</p>
    <p>Visible text</p>
  </div>


</body>
</html>
