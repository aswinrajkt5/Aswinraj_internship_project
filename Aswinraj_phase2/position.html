<!DOCTYPE html>
<html>
<head>
<title>Position</title>
<style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    li{
      display: inline;
      margin: 0 15px;
      cursor: pointer;
    }

    .content {
      margin-top: 85px;
      padding: 20px;
    }

   .card {
    position: relative;
    height: 319px;
    width: 300px;
    border: 1px solid black;
    padding: 0px;
    margin: auto;
    border-radius: 2%;
    background-color: grey;
    }

  .card img {
    width: 100%;
    border-radius: 2%;
    padding-top: 0%;
    height: 209px;
    margin-inline-start: 0px;
    }

  .badge {
      position: absolute;
      top: 4px;
      right: 6px;
      background: red;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      }

  h3,h4{
    text-align: center;
    margin: 5px;
    padding-top: 14px;
    color: white;
    }

  .button {
    position: static;
    width: 100px;
    margin: 20px auto;
    padding: 10px;
    background: rgb(5, 250, 5);
    color: white;
    text-align: center;
    border-radius: 5px;
    cursor: pointer;
    }
</style>
</head>
<body>

  <div class="navbar">
    <ol>
      <li>Home</li>
      <li>Services</li>
      <li>About</li>
      <li>Contact us</li>
    </ol>
  </div>

  <div class="content">

    <h2 style="color: black;">BMW M5 FOR SALE</h2><hr>

    <div class="card">
      <img src="image/BMW.jpg" alt="product">
      <div class="badge">SALE</div>
      <h3>BMW M4</h3>
      <h4>Price : $50,000</h4>
    </div>
  <div class="button">BUY NOW</div>


</body>
</html>
