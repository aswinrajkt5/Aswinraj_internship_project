<!DOCTYPE html>
<html>
<head>
<title>Card Design</title>
<style>
  .card {
  width: 300px;
  height: auto;
  margin: 30px auto;
  padding: 20px;           
  background-color: white;
  border-radius: 10px;
}

.card img {
  width: 30%;
  border-radius: 10px;
  margin-left: 84px;
  
}

.card h2 {
  width: auto;
  height: auto;
  margin-top: -29px;
}

.card p {
  width: auto;
  height: auto;
  margin: 10px 0;
  margin-top: -13%;
}

.card button {
  padding: 10px 15px;
  border: none;
  background-color: blue;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 0%;
}

body {
  font-family: Arial;
  background-color: rebeccapurple;
}
</style>

</head>
<body>

<div class="card">
  <img class="card img" src="image/images2.jpg" alt="Image">
  <h2 class="card h2">FOLLOW NOW</h2>
  <p class="card p">USER NAME</p>
  <button class="card button">Read More</button>
</div>

</body>
</html>
